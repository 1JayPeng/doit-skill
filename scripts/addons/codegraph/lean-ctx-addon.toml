[addon]
name = "codegraph"
version = "1.0.0"
description = "AST-level code graph index for symbol search and impact analysis"

[server]
type = "stdio"
command = "codegraph"
args = ['mcp']

[tools]
exposed_tools = [
  "codegraph_search",
  "codegraph_context",
  "codegraph_node",
  "codegraph_callers",
  "codegraph_callees",
  "codegraph_explore",
  "codegraph_impact",
  "codegraph_files",
  "codegraph_status",
  "codegraph_callees",
  "codegraph_callers",
]

[sandbox]
network = false
env_readonly = true
